spring.application.name=sophialink

# Configuración de PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5430/sophialink
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
# Logs de binding/validación y del MVC
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.validation=DEBUG

# Ver SQL y errores de la BD
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# (Opcional en dev) incluir stacktrace en la respuesta de error
server.error.include-message=ALWAYS
server.error.include-binding-errors=ALWAYS
server.error.include-stacktrace=ALWAYS
